sonar.projectKey=kessie12_asc-inventory-management-system
sonar.organization=kessie12

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=asc-inventory-management-system
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Disable the Oracle PL/SQL analyzer entirely to prevent the Data Dictionary warning
sonar.plsql.file.suffixes=-

# You can keep this if you want to ensure they are ignored by all other analyzers too
sonar.exclusions=**/*.sql, **/*.pks, **/*.pkb
